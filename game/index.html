<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Subway Surfers LIVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#231F20;font-family:'Segoe UI',Arial,sans-serif;}

/* Flash overlay — max z-index so Unity CSS can't bury it */
#sv-flash{
  position:fixed!important;top:60px!important;left:50%!important;
  transform:translateX(-50%)!important;
  z-index:2147483647!important;pointer-events:none;opacity:0;
  font-size:32px;font-weight:900;white-space:nowrap;
  background:rgba(0,0,0,.92)!important;padding:14px 34px;
  border-radius:40px;border:3px solid currentColor;letter-spacing:1px;
  display:block!important;
}
#sv-flash.show{animation:svflash 2.5s forwards!important;}
@keyframes svflash{
  0%  {opacity:0;transform:translateX(-50%) scale(.85);}
  10% {opacity:1;transform:translateX(-50%) scale(1.05);}
  20% {transform:translateX(-50%) scale(1);}
  75% {opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-30px);}
}

/* Settings tab */
#sv-tab{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  z-index:8000;background:linear-gradient(180deg,#7c3aed,#db2777);
  color:#fff;border:none;cursor:pointer;
  padding:14px 7px;border-radius:10px 0 0 10px;
  writing-mode:vertical-rl;font-size:10px;font-weight:900;
  letter-spacing:3px;text-transform:uppercase;
  transition:all .2s;box-shadow:-3px 0 20px rgba(124,58,237,.4);
  user-select:none;
}
#sv-tab:hover{padding-left:12px;box-shadow:-5px 0 30px rgba(124,58,237,.7);}
#sv-tab.hidden{opacity:0;pointer-events:none;}

/* Settings panel */
#sv-panel{
  position:fixed;right:-360px;top:0;width:360px;height:100%;
  background:rgba(8,9,18,.96);border-left:1px solid #1e2240;
  z-index:7999;transition:right .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
  box-shadow:-10px 0 40px rgba(0,0,0,.7);
  backdrop-filter:blur(10px);
}
#sv-panel.open{right:0;}
#sv-panel::-webkit-scrollbar{width:4px;}
#sv-panel::-webkit-scrollbar-thumb{background:#1e2240;border-radius:2px;}

.sv-header{
  background:linear-gradient(135deg,#0d0e1a,#12142a);
  padding:16px 18px;border-bottom:1px solid #1e2240;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.sv-logo{font-size:13px;font-weight:900;
  background:linear-gradient(90deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sv-close{background:none;border:none;color:#4b5563;cursor:pointer;
  font-size:18px;padding:4px 8px;border-radius:4px;transition:color .15s;}
.sv-close:hover{color:#fff;}
.sv-version{font-size:9px;color:#374151;font-family:monospace;margin-top:2px;}

.sv-section{padding:14px 16px;border-bottom:1px solid #0d0f1f;}
.sv-label{font-size:9px;font-weight:700;letter-spacing:3px;color:#4b5563;
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sv-label span{font-size:14px;}

.sv-input{width:100%;background:#060710;border:1px solid #1e2240;
  border-radius:8px;padding:9px 12px;color:#fff;font-size:12px;
  outline:none;transition:border-color .2s;}
.sv-input:focus{border-color:#7c3aed;}
.sv-input::placeholder{color:#374151;}

.sv-btn{width:100%;margin-top:8px;padding:10px;border-radius:8px;
  font-weight:900;font-size:11px;letter-spacing:1.5px;cursor:pointer;
  border:none;transition:all .2s;text-transform:uppercase;}
.sv-btn.idle{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;}
.sv-btn.idle:hover{opacity:.9;}
.sv-btn.connected{background:#1a1f35;color:#10b981;border:1px solid #065f46;}
.sv-btn.connecting{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid #92400e;}

.sv-status{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:#6b7280;}
.sv-dot{width:8px;height:8px;border-radius:50%;background:#374151;flex-shrink:0;transition:all .3s;}
.sv-dot.on{background:#10b981;box-shadow:0 0 8px #10b981;}
.sv-dot.warn{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sv-error{color:#ef4444;font-size:10px;margin-top:5px;display:none;}

.gift-row{display:flex;align-items:center;gap:8px;padding:7px 4px;
  border-radius:6px;transition:background .15s;}
.gift-row:hover{background:rgba(255,255,255,.03);}
.gift-emoji{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.gift-info{flex:1;min-width:0;}
.gift-name{font-size:11px;font-weight:700;color:#e2e8f0;}
.gift-coins{font-size:10px;color:#4b5563;font-family:monospace;}
.gift-action{background:#0a0b14;border:1px solid #1e2240;color:#9ca3af;
  border-radius:6px;padding:5px 8px;font-size:10px;cursor:pointer;
  outline:none;max-width:135px;transition:border-color .2s;}
.gift-action:focus{border-color:#7c3aed;color:#fff;}
.gift-del{background:none;border:none;color:#374151;cursor:pointer;
  font-size:14px;padding:2px 5px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.gift-del:hover{color:#ef4444;}

.sv-add-btn{width:100%;margin-top:10px;padding:8px;border-radius:7px;
  background:transparent;border:1px dashed #1e2240;color:#4b5563;
  font-size:11px;cursor:pointer;transition:all .2s;font-weight:600;}
.sv-add-btn:hover{border-color:#7c3aed;color:#a78bfa;}

.sv-add-form{background:#060710;border:1px solid #1e2240;
  border-radius:8px;padding:12px;margin-top:8px;display:none;}
.sv-add-form.show{display:block;}
.sv-form-row{display:flex;gap:6px;margin-bottom:6px;}
.sv-mini{background:#0a0b14;border:1px solid #1e2240;color:#fff;
  border-radius:6px;padding:6px 8px;font-size:11px;outline:none;width:100%;}
.sv-mini:focus{border-color:#7c3aed;}
.sv-form-actions{display:flex;gap:6px;margin-top:8px;}
.sv-form-save{flex:1;padding:7px;border-radius:6px;
  background:linear-gradient(135deg,#7c3aed,#db2777);
  color:#fff;border:none;font-size:10px;font-weight:900;cursor:pointer;letter-spacing:1px;}
.sv-form-cancel{padding:7px 12px;border-radius:6px;background:#0a0b14;
  color:#6b7280;border:1px solid #1e2240;font-size:10px;cursor:pointer;}

.test-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.test-btn{padding:7px 5px;border-radius:7px;border:1px solid #1e2240;
  font-size:10px;font-weight:700;cursor:pointer;background:transparent;
  color:#9ca3af;transition:all .15s;text-align:center;}
.test-btn:hover{background:rgba(255,255,255,.05);border-color:#7c3aed;color:#a78bfa;}
.test-btn:active{transform:scale(.95);}

.recent-gift{background:#0d0f1f;border:1px solid #1e2240;
  border-radius:8px;padding:8px 10px;margin-bottom:6px;}
.rg-user{font-size:11px;font-weight:700;color:#a78bfa;}
.rg-action{font-size:10px;font-weight:700;margin-top:2px;}
.rg-time{font-size:9px;color:#374151;float:right;font-family:monospace;}
.rg-empty{color:#374151;font-size:11px;text-align:center;padding:20px 0;}

#sv-badge{position:fixed;right:28px;top:12px;z-index:8000;
  background:linear-gradient(135deg,#7c3aed,#db2777);
  color:#fff;font-size:10px;font-weight:900;
  padding:4px 9px;border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .3s;box-shadow:0 2px 12px rgba(124,58,237,.5);}
#sv-badge.show{opacity:1;}
</style>
</head>
<body>

<div id="sv-flash"></div>
<div id="sv-badge">🎁 0</div>
<button id="sv-tab" onclick="svToggle()">⚙ LIVE</button>

<div id="sv-panel">
  <div class="sv-header">
    <div>
      <div class="sv-logo">StreamVibe — Subway Surfers LIVE</div>
      <div class="sv-version" id="sv-ver">v1.0.0</div>
    </div>
    <button class="sv-close" onclick="svToggle()">✕</button>
  </div>

  <!-- TikTok -->
  <div class="sv-section">
    <div class="sv-label"><span>📱</span> TikTok Live</div>
    <input class="sv-input" id="sv-user" placeholder="@yourusername" />
    <button class="sv-btn idle" id="sv-conn" onclick="svConnToggle()">♪ CONNECT MY LIVE</button>
    <div class="sv-status">
      <div class="sv-dot" id="sv-dot"></div>
      <span id="sv-status">Not connected</span>
    </div>
    <div class="sv-error" id="sv-err"></div>
  </div>

  <!-- Gift config -->
  <div class="sv-section">
    <div class="sv-label"><span>🎁</span> Gift → Trigger</div>
    <div id="sv-gifts"></div>
    <button class="sv-add-btn" onclick="svShowForm()">+ Add Custom Gift</button>
    <div class="sv-add-form" id="sv-form">
      <div class="sv-form-row">
        <input class="sv-mini" id="af-emoji" placeholder="🎁" style="max-width:48px;text-align:center;">
        <input class="sv-mini" id="af-name" placeholder="Gift name">
        <input class="sv-mini" id="af-coins" placeholder="coins" type="number" min="1" style="max-width:58px;">
      </div>
      <select class="gift-action" id="af-action" style="width:100%;max-width:100%;"></select>
      <div class="sv-form-actions">
        <button class="sv-form-save" onclick="svSaveGift()">SAVE</button>
        <button class="sv-form-cancel" onclick="svHideForm()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Test -->
  <div class="sv-section">
    <div class="sv-label"><span>🧪</span> Test Triggers</div>
    <div class="test-grid" id="sv-tests"></div>
  </div>

  <!-- Recent -->
  <div class="sv-section">
    <div class="sv-label"><span>📋</span> Recent Gifts</div>
    <div id="sv-recent"><div class="rg-empty">Waiting for gifts...</div></div>
  </div>
</div>

<script>
// ── Flash ─────────────────────────────────────────────────────────
var _ft;
function svFlash(text,color){
  var el=document.getElementById('sv-flash');
  // Re-append to body so it's always the topmost DOM element
  document.body.appendChild(el);
  el.textContent=text;el.style.color=color;
  el.style.borderColor=color;el.style.boxShadow='0 0 50px '+color+'99';
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  clearTimeout(_ft);_ft=setTimeout(function(){el.classList.remove('show');},2500);
}

// ── Keyboard simulation ── dispatch to document, same as real keypresses ─
function svKey(key, times) {
  var CODES = {' ':32, 'ArrowUp':38, 'ArrowDown':40, 'ArrowLeft':37, 'ArrowRight':39};
  for (var i = 0; i < (times || 1); i++) {
    (function(d) {
      setTimeout(function() {
        var opts = {
          key: key,
          code: key === ' ' ? 'Space' : key,
          keyCode: CODES[key] || 0,
          which: CODES[key] || 0,
          bubbles: true,
          cancelable: true
        };
        document.dispatchEvent(new KeyboardEvent('keydown', opts));
        setTimeout(function() {
          document.dispatchEvent(new KeyboardEvent('keyup', opts));
        }, 100);
      }, d * 350);
    })(i);
  }
}

// ── SendMessage (best-effort) ─────────────────────────────────────
function svSend(obj,method,param){
  var sm=(window.unityGame&&typeof window.unityGame.SendMessage==='function')
    ?window.unityGame.SendMessage.bind(window.unityGame)
    :(typeof window.SendMessage==='function'?window.SendMessage:null);
  if(!sm)return;
  try{param!==undefined?sm(obj,method,param):sm(obj,method);}catch(e){}
}
function svSendAll(method,param){
  ['PickupManager','InGame','GameManager','PickupManagerController'].forEach(function(o){
    svSend(o,method,param);
  });
}

// ── Actions ───────────────────────────────────────────────────────
var ACTIONS={
  jump:      {label:'⬆️ Jump',            flash:{text:'⬆️ JUMP!',      color:'#55efc4'},fn:function(){svKey(' ');}},
  dbl_jump:  {label:'⬆️⬆️ Double Jump',  flash:{text:'⬆️⬆️ JUMPS!',   color:'#00b894'},fn:function(){svKey(' ',2);}},
  slide:     {label:'⬇️ Slide/Roll',      flash:{text:'⬇️ SLIDE!',     color:'#74b9ff'},fn:function(){svKey('ArrowDown');}},
  left:      {label:'⬅️ Move Left',       flash:{text:'⬅️ LEFT!',      color:'#a29bfe'},fn:function(){svKey('ArrowLeft');}},
  right:     {label:'➡️ Move Right',      flash:{text:'➡️ RIGHT!',     color:'#fd79a8'},fn:function(){svKey('ArrowRight');}},
  jump_left: {label:'↖️ Jump Left',       flash:{text:'↖️ JUMP LEFT!', color:'#a78bfa'},fn:function(){svKey('ArrowLeft');svKey(' ');}},
  jump_right:{label:'↗️ Jump Right',      flash:{text:'↗️ JUMP RIGHT!',color:'#f472b6'},fn:function(){svKey('ArrowRight');svKey(' ');}},
  coins:     {label:'💰 Spawn Coins',     flash:{text:'💰 COINS!',     color:'#ffd700'},fn:function(){svSendAll('SpawnCoinRows','5');}},
  jetpack:   {label:'🚀 Jetpack',         flash:{text:'🚀 JETPACK!',   color:'#ff9f43'},fn:function(){svSendAll('ForceSpawnPickupType','Jetpack');}},
  magnet:    {label:'🧲 Magnet',          flash:{text:'🧲 MAGNET!',    color:'#74b9ff'},fn:function(){svSendAll('ForceSpawnPickupType','CoinMagnet');}},
  hoverboard:{label:'🛹 Hoverboard',      flash:{text:'🛹 HOVERBOARD!',color:'#fd79a8'},fn:function(){svSendAll('ForceSpawnPickupType','Hoverboard');}},
  x2:        {label:'✖️ x2 Score',        flash:{text:'✖️ x2 SCORE!',  color:'#a29bfe'},fn:function(){svSendAll('ForceSpawnPickupType','Multiplier');}},
  sneakers:  {label:'👟 Super Sneakers',  flash:{text:'👟 SNEAKERS!',  color:'#55efc4'},fn:function(){svSendAll('ForceSpawnPickupType','SuperSneakers');}},
  hype:      {label:'🎉 Hype Flash',      flash:{text:'🎉 HYPE!',      color:'#fd79a8'},fn:function(){}},
  none:      {label:'❌ No Action',       flash:null,                                   fn:function(){}},
};
function svFire(key){
  var a=ACTIONS[key];if(!a)return;
  if(a.flash)svFlash(a.flash.text,a.flash.color);
  if(a.fn)a.fn();
}

// ── Gift config ───────────────────────────────────────────────────
var DEFAULTS=[
  {id:'rose',       emoji:'🌹',name:'Rose',       coins:1,  action:'coins'},
  {id:'bouquet',    emoji:'💐',name:'Bouquet',    coins:50, action:'magnet'},
  {id:'galaxy',     emoji:'🌌',name:'Galaxy',     coins:100,action:'jetpack'},
  {id:'drama_queen',emoji:'👑',name:'Drama Queen',coins:200,action:'x2'},
  {id:'lion',       emoji:'🦁',name:'Lion',       coins:500,action:'sneakers'},
  {id:'diamond',    emoji:'💎',name:'Diamond',    coins:999,action:'hoverboard'},
];
var gifts=[];
function loadGifts(){try{var s=localStorage.getItem('sv_gifts');gifts=s?JSON.parse(s):DEFAULTS.map(function(g){return Object.assign({},g);});}catch(e){gifts=DEFAULTS.map(function(g){return Object.assign({},g);});}}
function saveGifts(){try{localStorage.setItem('sv_gifts',JSON.stringify(gifts));}catch(e){}}

function actionOpts(sel){
  return Object.keys(ACTIONS).map(function(k){
    return '<option value="'+k+'"'+(k===sel?' selected':'')+'>'+ACTIONS[k].label+'</option>';
  }).join('');
}

function renderGifts(){
  var gl=document.getElementById('sv-gifts');
  gl.innerHTML=gifts.map(function(g,i){
    return '<div class="gift-row" data-i="'+i+'">'+
      '<span class="gift-emoji">'+g.emoji+'</span>'+
      '<div class="gift-info"><div class="gift-name">'+g.name+'</div><div class="gift-coins">'+g.coins+'c</div></div>'+
      '<select class="gift-action">'+actionOpts(g.action)+'</select>'+
      '<button class="gift-del" title="Remove">✕</button>'+
    '</div>';
  }).join('');

  // Attach listeners properly — no inline onclick
  gl.querySelectorAll('.gift-action').forEach(function(sel,i){
    sel.addEventListener('change',function(){gifts[i].action=this.value;saveGifts();});
  });
  gl.querySelectorAll('.gift-del').forEach(function(btn,i){
    btn.addEventListener('click',function(){gifts.splice(i,1);saveGifts();renderGifts();});
  });

  var tg=document.getElementById('sv-tests');
  tg.innerHTML=gifts.map(function(g){
    return '<button class="test-btn" data-action="'+g.action+'">'+g.emoji+' '+g.name+'</button>';
  }).join('');
  tg.querySelectorAll('.test-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      svFire(this.dataset.action);
    });
  });
}

// Add gift form
function svShowForm(){
  document.getElementById('af-action').innerHTML=actionOpts('');
  document.getElementById('sv-form').classList.add('show');
}
function svHideForm(){
  document.getElementById('sv-form').classList.remove('show');
  ['af-emoji','af-name','af-coins'].forEach(function(id){document.getElementById(id).value='';});
}
function svSaveGift(){
  var name=document.getElementById('af-name').value.trim();
  if(!name){alert('Enter a gift name');return;}
  gifts.push({id:'c'+Date.now(),emoji:document.getElementById('af-emoji').value.trim()||'🎁',name:name,coins:parseInt(document.getElementById('af-coins').value)||1,action:document.getElementById('af-action').value||'none'});
  saveGifts();renderGifts();svHideForm();
}

// ── Panel toggle ──────────────────────────────────────────────────
var _open=false;
function svToggle(){
  _open=!_open;
  document.getElementById('sv-panel').classList.toggle('open',_open);
  document.getElementById('sv-tab').classList.toggle('hidden',_open);
}
document.addEventListener('keydown',function(e){if(e.key==='F2'){e.preventDefault();svToggle();}});

// ── TikTok WebSocket ──────────────────────────────────────────────
var ws=null,connected=false,giftCount=0;

function svConnToggle(){
  if(connected||ws){svDisc();return;}
  var u=document.getElementById('sv-user').value.trim().replace('@','');
  if(!u){svErr('Enter your TikTok username');return;}
  svConn(u);
}
function svConn(u){
  var btn=document.getElementById('sv-conn');
  btn.className='sv-btn connecting';btn.textContent='Connecting...';
  document.getElementById('sv-err').style.display='none';
  document.getElementById('sv-dot').className='sv-dot warn';
  document.getElementById('sv-status').textContent='Connecting...';
  try{
    ws=new WebSocket('ws://127.0.0.1:21213');
    ws.onopen=function(){ws.send(JSON.stringify({action:'connect',username:u}));};
    ws.onmessage=function(e){
      try{
        var d=JSON.parse(e.data);
        if(d.type==='connected'){
          connected=true;
          btn.className='sv-btn connected';btn.textContent='@'+u+' — Disconnect';
          document.getElementById('sv-dot').className='sv-dot on';
          document.getElementById('sv-status').textContent='Live @'+u;
        }else if(d.type==='gift'){svGift(d);}
        else if(d.type==='error'){svErr(d.message);}
      }catch(err){}
    };
    ws.onerror=function(){svErr('Cannot connect to TikTok bridge (port 21213)');svDisc();};
    ws.onclose=function(){if(connected)svDisc();};
  }catch(e){svErr(e.message);}
}
function svDisc(){
  if(ws){try{ws.close();}catch(e){}ws=null;}
  connected=false;
  var btn=document.getElementById('sv-conn');
  btn.className='sv-btn idle';btn.textContent='♪ CONNECT MY LIVE';
  document.getElementById('sv-dot').className='sv-dot';
  document.getElementById('sv-status').textContent='Not connected';
}
function svErr(msg){
  var e=document.getElementById('sv-err');e.textContent=msg;e.style.display='block';
  setTimeout(function(){e.style.display='none';},5000);
  document.getElementById('sv-conn').className='sv-btn idle';
  document.getElementById('sv-conn').textContent='♪ CONNECT MY LIVE';
  document.getElementById('sv-dot').className='sv-dot';
  document.getElementById('sv-status').textContent='Not connected';
}
function svGift(d){
  var sorted=gifts.slice().sort(function(a,b){return b.coins-a.coins;});
  var match=sorted.find(function(g){return d.coins>=g.coins;})||gifts[0];
  if(!match)return;
  svFire(match.action);
  svAddRecent(d.username||'viewer',match);
  giftCount++;
  var badge=document.getElementById('sv-badge');
  badge.textContent='🎁 '+giftCount;badge.classList.add('show');
}
function svAddRecent(user,gift){
  var c=document.getElementById('sv-recent');
  var empty=c.querySelector('.rg-empty');if(empty)empty.remove();
  var now=new Date();
  var t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var el=document.createElement('div');el.className='recent-gift';
  el.innerHTML='<span class="rg-time">'+t+'</span>'+
    '<div class="rg-user">@'+user+' → '+gift.emoji+' '+gift.name+'</div>'+
    '<div class="rg-action" style="color:#a78bfa">'+(ACTIONS[gift.action]?ACTIONS[gift.action].label:gift.action)+'</div>';
  c.insertBefore(el,c.firstChild);
  while(c.children.length>50)c.removeChild(c.lastChild);
}

// ── Init ──────────────────────────────────────────────────────────
loadGifts();
renderGifts();
</script>
