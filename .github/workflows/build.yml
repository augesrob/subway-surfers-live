name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Strip BOM and set version in package.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            // Strip BOM (added by git CRLF normalization on Windows runners)
            const raw = fs.readFileSync('package.json', 'utf8').replace(/^﻿/, '');
            const pkg = JSON.parse(raw);
            pkg.version = '$VERSION';
            // Remove icon paths - no icon asset in repo
            delete pkg.build.win.icon;
            delete pkg.build.nsis.installerIcon;
            delete pkg.build.nsis.uninstallerIcon;
            // Write back clean UTF-8, no BOM
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n', { encoding: 'utf8' });
            console.log('package.json: BOM stripped, version set to', pkg.version);
          "

      - name: Install dependencies
        run: npm install

      - name: Build portable app with electron-packager
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npx electron-packager . "Subway Surfers LIVE" \
            --platform=win32 \
            --arch=x64 \
            --electron-version=28.0.0 \
            --out=dist \
            --overwrite \
            --ignore="^/dist" \
            --ignore="node_modules/.cache" \
            --ignore="^/.github" \
            --app-version="$VERSION"

      - name: Zip the build output
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $src = "dist\Subway Surfers LIVE-win32-x64"
          $zip = "dist\SubwaySurfersLIVE-v$version-win64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
          Write-Host "Created: $zip"
          Get-Item $zip | Select-Object Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubwaySurfersLIVE-v${{ steps.version.outputs.version }}-win64
          path: dist/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Subway Surfers LIVE v${{ steps.version.outputs.version }}"
          body: |
            ## Subway Surfers LIVE v${{ steps.version.outputs.version }}

            ### How to install
            1. Download `SubwaySurfersLIVE-v${{ steps.version.outputs.version }}-win64.zip`
            2. Extract the zip anywhere
            3. Run `Subway Surfers LIVE.exe` inside the extracted folder

            ### Features
            - Full Subway Surfers game (no ads, no paywalls)
            - TikTok Live gift integration
            - Customizable gift → trigger mapping
            - Press **F2** to open/close the settings panel
            - Requires a TikTok Live bridge on `ws://127.0.0.1:21213`
          files: dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
