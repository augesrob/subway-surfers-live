name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Strip BOM and set version in package.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('package.json', 'utf8').replace(/^﻿/, '');
            const pkg = JSON.parse(raw);
            pkg.version = '$VERSION';
            delete pkg.build.win.icon;
            delete pkg.build.nsis.installerIcon;
            delete pkg.build.nsis.uninstallerIcon;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n', { encoding: 'utf8' });
            console.log('Set version to', pkg.version, '- BOM stripped');
          "

      - name: Install dependencies
        run: npm install

      - name: Build NSIS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - name: List build output
        shell: powershell
        run: Get-ChildItem dist -Recurse -File | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubwaySurfersLIVE-v${{ steps.version.outputs.version }}-installer
          path: |
            dist/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Subway Surfers LIVE v${{ steps.version.outputs.version }}"
          body: |
            ## Subway Surfers LIVE v${{ steps.version.outputs.version }}

            ### Install
            Download **`Subway Surfers LIVE Setup ${{ steps.version.outputs.version }}.exe`** and run it.

            The installer will add a desktop shortcut and Start Menu entry.

            ### Features
            - Full Subway Surfers game — no ads, no paywalls
            - TikTok Live gift integration
            - Customizable gift → trigger mapping
            - Press **F2** to open/close the settings panel
            - Requires a TikTok Live bridge running on `ws://127.0.0.1:21213`

            ### To release a new version
            ```
            git tag v1.x.x && git push origin v1.x.x
            ```
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
